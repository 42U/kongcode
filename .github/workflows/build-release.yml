name: Build SEA release artifacts

# Triggered by pushing a v* tag (e.g. v0.7.0-rc.1, v0.7.0). Each platform
# matrix entry runs `npm run sea` on its native runner, producing a single
# self-contained executable that the bootstrap can ship alongside dist/.
# The artifacts are attached to the GitHub Release so end users can download
# them via the plugin's first-run bootstrap (or via direct release download
# for advanced setups).
#
# Why per-platform native runners (vs cross-build): Node SEA bakes the target
# platform's Node binary into the executable. The simplest way to produce a
# correct arm64 binary is to run on an arm64 host. GitHub provides arm64
# runners for both Linux and macOS, so we use them.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build kongcode-${{ matrix.os_name }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os_name: linux
            arch: x64
            ext: ""
          - runner: ubuntu-24.04-arm
            os_name: linux
            arch: arm64
            ext: ""
          - runner: macos-13
            os_name: darwin
            arch: x64
            ext: ""
          - runner: macos-14
            os_name: darwin
            arch: arm64
            ext: ""
          - runner: windows-latest
            os_name: win32
            arch: x64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build SEA binaries (daemon + mcp)
        shell: bash
        run: |
          mkdir -p dist/bin
          # Helper: build one SEA binary from a bundle.cjs + sea-config.json
          # → dist/bin/<name>-<os>-<arch>(.ext). Mirrors the manual sea:daemon
          # / sea:mcp scripts but inlined for matrix-friendly per-step logging.
          build_sea() {
            local bundle_script="$1"   # npm run target name
            local config_file="$2"     # sea-config-XXX.json
            local blob_file="$3"       # dist/XXX-sea-prep.blob
            local bin_prefix="$4"      # kongcode-daemon | kongcode-mcp
            local bin_name="${bin_prefix}-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.ext }}"
            echo "::group::Build $bin_name"
            npm run "$bundle_script"
            node --experimental-sea-config "$config_file"
            cp "$(command -v node)" "dist/bin/$bin_name"
            if [ "${{ matrix.os_name }}" = "darwin" ]; then
              codesign --remove-signature "dist/bin/$bin_name" || true
            fi
            npx postject "dist/bin/$bin_name" NODE_SEA_BLOB "$blob_file" \
              --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2 \
              $([ "${{ matrix.os_name }}" = "darwin" ] && echo "--macho-segment-name NODE_SEA")
            if [ "${{ matrix.os_name }}" = "darwin" ]; then
              codesign --sign - "dist/bin/$bin_name" || true
            fi
            echo "::endgroup::"
          }

          build_sea "bundle:daemon" "sea-daemon-config.json" "dist/daemon-sea-prep.blob" "kongcode-daemon"
          build_sea "bundle:mcp"    "sea-mcp-config.json"    "dist/mcp-sea-prep.blob"    "kongcode-mcp"

      - name: Upload daemon artifact
        uses: actions/upload-artifact@v4
        with:
          name: kongcode-daemon-${{ matrix.os_name }}-${{ matrix.arch }}
          path: dist/bin/kongcode-daemon-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.ext }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload mcp-client artifact
        uses: actions/upload-artifact@v4
        with:
          name: kongcode-mcp-${{ matrix.os_name }}-${{ matrix.arch }}
          path: dist/bin/kongcode-mcp-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.ext }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub Release with artifacts
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p release-bin
          find artifacts -type f -name "kongcode-*" -exec cp {} release-bin/ \;
          ls -la release-bin/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-bin/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          generate_release_notes: true
